name: Build Electron App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]
        arch: [x64]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Package Electron app
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npx electron-builder --win --x64 --config.extraMetadata.main=electron/main.cjs --publish=never

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-editor-windows-${{ matrix.arch }}-${{ github.sha }}
          path: release/*.exe
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: resume-editor-windows-*/*
          draft: false
          generate_release_notes: true
