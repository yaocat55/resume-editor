name: Build Electron App

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        shell: bash
        run: |
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -1) || echo "v0.0.0"
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          TAG="v$NEXT"

          echo "Latest tag: $LATEST_TAG"
          echo "Next:       $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set version
        shell: bash
        run: |
          node -e "
            const p = require('./package.json');
            p.version = '${{ needs.version.outputs.version }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci

      - name: Build & package Electron app
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npx vite build && npx electron-builder --win --x64 --publish=never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Resume-Editor-Windows
          path: release/*.exe
          if-no-files-found: error

  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            node -e "
              const p = require('./package.json');
              p.version = '${{ needs.version.outputs.version }}';
              require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
            "
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add package.json
            git commit --allow-empty -m "chore: bump to $TAG [skip ci]"
            git tag "$TAG"
          fi
          echo "Using tag: $TAG"

      - name: Push tag
        run: git push origin "${{ needs.version.outputs.tag }}" || true

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: Resume-Editor-Windows
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: release-artifacts/*
          draft: false
          generate_release_notes: true
