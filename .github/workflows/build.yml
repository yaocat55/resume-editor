name: Build Electron App

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package Electron app
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npx vite build && npx electron-builder --win --x64 --publish=never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Resume-Editor-Windows
          path: release/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version & create tag
        id: bump
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          TAG="v$NEXT"

          echo "Current: v$VERSION"
          echo "Next:    $TAG"

          node -e "
            const p = require('./package.json');
            p.version = '$NEXT';
            require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          "

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "chore: bump to $TAG [skip ci]"
          git tag "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: git push origin --tags

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: Resume-Editor-Windows
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          files: release-artifacts/*
          draft: false
          generate_release_notes: true
