name: Build Electron App

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package Electron app
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npx vite build && npx electron-builder --win --x64 --publish=never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Resume-Editor-Windows
          path: release/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version & create tag
        id: bump
        shell: bash
        run: |
          # 读取最新 tag 作为基线，避免依赖 package.json 是否被前次 CI 更新
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -1) || echo "v0.0.0"
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          VERSION=${LATEST_TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          TAG="v$NEXT"

          echo "Latest tag: $LATEST_TAG"
          echo "Next:       $TAG"

          # 如果 tag 已被 CI 创建但推送失败，直接复用
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists, reusing."
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 更新 package.json + 本地 tag
          node -e "
            const p = require('./package.json');
            p.version = '$NEXT';
            require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          "

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit --allow-empty -m "chore: bump to $TAG [skip ci]"
          git tag "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: git push origin "${{ steps.bump.outputs.tag }}"

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: Resume-Editor-Windows
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          files: release-artifacts/*
          draft: false
          generate_release_notes: true
